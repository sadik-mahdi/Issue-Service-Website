<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue Tracker | Home</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
    <link rel="stylesheet" href="style/styles.css">
</head>

<body class="bg-[#F6F8FA]">
  <nav class="bg-[#FFFFFF] border-b-[#D0D7DE] text-[#24292F]">
    <div class="navbar bg-base-100 shadow-sm ">
      <div class="navbar-start">
        <a class="btn btn-ghost text-xl"><img class="h-full" src="./assets/github-logo.png" alt="" srcset="">GitHub Issues Tracker</a>
      </div>
      <div class="navbar-end gap-4">
        <label class="input">
          <input id="input-search" type="search" required placeholder="Search common Issue" class="w-[320px]" />
        </label>
        <a id="btn-search" class="btn btn-primary">Search</a>
      </div>
    </div>
  </nav>

  <main class="bg-[#F6F8FA]">
    <section class="container-filter-btn pb-2 bg-[#FF6B6B]">
      <div class="w-7/10 mx-auto p-6 gap-2">
        <button onclick="applyBtn(this)" id="allButton" class="btn h-10 w-30 bg-white">All</button>
        <button onclick="applyBtn(this)" id="openButton" class="btn h-10 w-30 bg-white">Open</button>
        <button onclick="applyBtn(this)" id="closedButton" class="btn h-10 w-30 bg-white">Closed</button>
      </div>
    </section>
    
    <div class="container-head w-7/10 mx-auto flex justify-between items-center gap-4 h-full bg-white p-6 border-b-1">
      <div class="c-head-left flex items-center gap-2">
        <img class="h-full" src="./assets/Aperture.png" alt="" srcset="">
        <div class="text">
          <h1 class="font-bold text-[20px]"><span id="totalIssues">50</span> Issues</h1>
          <p class="text-gray"> Track and manage your project issues</p>
        </div>
      </div>
      <div class="c-head-right flex gap-2 items-end">
        <div class="flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-green-500"></span>
          <p class="text-sm font-medium text-gray-700">Open</p>
        </div>

        <div class="flex items-center gap-2">
          <span class="h-2 w-2 rounded-full bg-purple-500"></span>
          <p class="text-sm font-medium text-gray-700">Closed</p>
        </div>
      </div>
    </div>

    <section 
      id="issues-container" 
      class=" p-10 w-7/10 mx-auto grid grid-cols-4 gap-5 bg-[#F6F8FA]">
        
    </section>


    <section>
      <dialog id="issue_Modal" class="modal modal-bottom sm:modal-middle ">
        <div class="modal-box ">
          <div id="details_container" class="">
            
          </div>
          <div class="modal-action">
            <form method="dialog">
              <button class="btn">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </section>

  </main>

  <script src="./js/home.js"></script>
  <script src="./js/index.js"></script>
</body>
</html>
